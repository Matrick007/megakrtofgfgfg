<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitica 2.0 — Игровой трекер привычек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0c0f1c 0%, #1a1f30 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eef2ff;
        }

        /* Основной контейнер */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
        }

        /* Общие стили карточек */
        .card {
            background: rgba(20, 24, 36, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(110, 86, 207, 0.2);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        /* Заголовки секций */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #b1bbf0;
            font-weight: 600;
            font-size: 1.2rem;
        }

        /* Профиль персонажа */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6e56cf, #b794f4);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 8px 0 #3f2e7a;
        }

        .info h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .level-badge {
            background: #ffd966;
            color: #1a1f30;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-block;
            font-size: 14px;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-icon {
            width: 30px;
            font-size: 20px;
        }

        .progress-bar {
            flex: 1;
            height: 14px;
            background: #262d40;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 0.4s ease;
        }

        .hp .progress-fill { background: linear-gradient(90deg, #ff6b6b, #ff9f9f); }
        .exp .progress-fill { background: linear-gradient(90deg, #6e56cf, #a58aff); }

        .stat-value {
            min-width: 60px;
            font-size: 15px;
            color: #bdc3e6;
        }

        /* Список задач */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-item {
            background: #1f253b;
            border-radius: 24px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-left: 6px solid;
            transition: all 0.2s;
            cursor: pointer;
        }

        .task-item:hover {
            transform: translateX(6px);
            background: #2b314b;
        }

        .task-daily { border-left-color: #6e56cf; }
        .task-todo { border-left-color: #ffb347; }
        .task-habit { border-left-color: #4ecdc4; }

        .task-check {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            border: 2px solid #3e4760;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .task-item.completed .task-check {
            background: #6e56cf;
            border-color: #6e56cf;
        }

        .task-item.completed .task-check::after {
            content: "✓";
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #949ec0;
        }

        .task-streak {
            background: #2e3650;
            padding: 2px 10px;
            border-radius: 30px;
            color: #ffd966;
        }

        /* Кнопка добавления задачи */
        .add-task-form {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .add-task-form input {
            flex: 1;
            background: #1a2037;
            border: 1px solid #353e5a;
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .add-task-form input:focus {
            border-color: #6e56cf;
        }

        .add-task-form select {
            background: #1a2037;
            border: 1px solid #353e5a;
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }

        .add-btn {
            background: #6e56cf;
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 0 #3f2e7a;
            transition: 0.1s;
        }

        .add-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3f2e7a;
        }

        /* Инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .item-card {
            background: #1f253b;
            border-radius: 22px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid #323b57;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover {
            background: #2c3350;
            border-color: #6e56cf;
        }

        .item-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .item-desc {
            font-size: 11px;
            color: #949ec0;
            margin: 5px 0;
        }

        .item-count {
            background: #6e56cf;
            display: inline-block;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Магазин */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .shop-item {
            background: #1f253b;
            border-radius: 22px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #323b57;
            cursor: pointer;
            transition: 0.2s;
        }

        .shop-item:hover {
            background: #2c3350;
            border-color: #ffb347;
        }

        .shop-icon {
            font-size: 28px;
            background: #2e3650;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shop-info {
            flex: 1;
        }

        .shop-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .shop-info p {
            font-size: 12px;
            color: #949ec0;
        }

        .shop-price {
            background: #ffd966;
            color: #1a1f30;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: #1f253b;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }

        .stat-value-large {
            font-size: 32px;
            font-weight: 700;
            color: #6e56cf;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2b314b;
            border-left: 6px solid #6e56cf;
            border-radius: 20px;
            padding: 16px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(400px);
            transition: 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Левая колонка: профиль, инвентарь, магазин -->
        <div>
            <!-- Профиль персонажа -->
            <div class="card">
                <div class="profile-header">
                    <div class="avatar">🧙‍♂️</div>
                    <div class="info">
                        <h2 id="characterName">Маг Вова</h2>
                        <span class="level-badge" id="levelDisplay">Ур. 1</span>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-row hp">
                        <span class="stat-icon">❤️</span>
                        <div class="progress-bar"><div class="progress-fill" id="hpBar" style="width: 100%"></div></div>
                        <span class="stat-value" id="hpText">100/100</span>
                    </div>
                    <div class="stat-row exp">
                        <span class="stat-icon">✨</span>
                        <div class="progress-bar"><div class="progress-fill" id="expBar" style="width: 0%"></div></div>
                        <span class="stat-value" id="expText">0/100</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-icon">🪙</span>
                        <span style="color:#ffd966; font-weight:bold;" id="goldAmount">100</span> золота
                    </div>
                </div>
            </div>

            <!-- Инвентарь -->
            <div class="card">
                <div class="section-header">
                    <span>🎒 Инвентарь</span>
                    <span id="inventoryCount">0/8</span>
                </div>
                <div class="inventory-grid" id="inventoryContainer">
                    <!-- JS заполнит -->
                </div>
            </div>

            <!-- Магазин -->
            <div class="card">
                <div class="section-header">
                    <span>🏪 Лавка</span>
                    <span>💰 <span id="shopGold">100</span></span>
                </div>
                <div class="shop-grid" id="shopContainer">
                    <!-- JS заполнит -->
                </div>
            </div>
        </div>

        <!-- Центральная колонка: задачи -->
        <div>
            <div class="card">
                <div class="section-header">
                    <span>📋 Квесты на сегодня</span>
                    <span id="taskCount">0</span>
                </div>
                <div class="task-list" id="taskList"></div>

                <!-- Форма добавления задачи -->
                <div class="add-task-form">
                    <input type="text" id="newTaskTitle" placeholder="Новый квест...">
                    <select id="newTaskType">
                        <option value="daily">Ежедневное</option>
                        <option value="todo">Обычное</option>
                        <option value="habit">Привычка</option>
                    </select>
                    <button class="add-btn" id="addTaskBtn">➕</button>
                </div>
            </div>
        </div>

        <!-- Правая колонка: статистика и прочее -->
        <div>
            <div class="card">
                <div class="section-header">
                    <span>📊 Статистика</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div>🔥 Дней подряд</div>
                        <div class="stat-value-large" id="streakStat">3</div>
                    </div>
                    <div class="stat-card">
                        <div>✅ Выполнено</div>
                        <div class="stat-value-large" id="completedStat">7</div>
                    </div>
                    <div class="stat-card">
                        <div>⚔️ Босс</div>
                        <div class="stat-value-large" id="bossHp">75%</div>
                    </div>
                    <div class="stat-card">
                        <div>🏆 Рейтинг</div>
                        <div class="stat-value-large" id="rating">128</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <span>⚡ Активные баффы</span>
                </div>
                <div id="buffs">Нет активных эффектов</div>
            </div>
        </div>
    </div>

    <!-- Уведомление -->
    <div class="notification" id="notification">✨ +10 опыта</div>

    <script>
        // ==================== ДАННЫЕ ====================
        let character = {
            name: 'Маг Вова',
            level: 1,
            hp: 100,
            maxHp: 100,
            exp: 0,
            expToNext: 100,
            gold: 100
        };

        let tasks = [
            { id: 1, title: 'Утренняя зарядка', type: 'daily', completed: true, streak: 5, expReward: 50, goldReward: 10 },
            { id: 2, title: 'Выпить 2л воды', type: 'daily', completed: false, streak: 3, expReward: 30, goldReward: 5 },
            { id: 3, title: 'Сделать макет', type: 'todo', completed: false, due: '20:00', expReward: 100, goldReward: 20 },
            { id: 4, title: 'Почитать книгу', type: 'habit', completed: false, expReward: 25, goldReward: 3 }
        ];

        let inventory = [
            { id: 'potion', name: 'Малое зелье', icon: '🧪', desc: '+30 HP', count: 2, effect: 'hp', value: 30 },
            { id: 'sword', name: 'Меч', icon: '⚔️', desc: '+5 силы', count: 1 },
            { id: 'shield', name: 'Щит', icon: '🛡️', desc: '+3 защиты', count: 1 },
            { id: 'scroll', name: 'Свиток мудрости', icon: '📜', desc: '+50 опыта', count: 1, effect: 'exp', value: 50 }
        ];

        const shop = [
            { id: 'potion', name: 'Малое зелье', icon: '🧪', desc: 'Восст. 30 HP', price: 25 },
            { id: 'expPotion', name: 'Эликсир опыта', icon: '⚗️', desc: '+50 опыта', price: 40 },
            { id: 'sword', name: 'Железный меч', icon: '⚔️', desc: 'Сила +5', price: 100 },
            { id: 'luckAmulet', name: 'Амулет удачи', icon: '🍀', desc: '+10% золота', price: 150 }
        ];

        let streak = 3;
        let completedTasksCount = 7;

        // ==================== ЭЛЕМЕНТЫ DOM ====================
        const taskListEl = document.getElementById('taskList');
        const inventoryContainer = document.getElementById('inventoryContainer');
        const shopContainer = document.getElementById('shopContainer');
        const hpBar = document.getElementById('hpBar');
        const hpText = document.getElementById('hpText');
        const expBar = document.getElementById('expBar');
        const expText = document.getElementById('expText');
        const levelDisplay = document.getElementById('levelDisplay');
        const goldAmount = document.getElementById('goldAmount');
        const shopGold = document.getElementById('shopGold');
        const inventoryCount = document.getElementById('inventoryCount');
        const streakStat = document.getElementById('streakStat');
        const completedStat = document.getElementById('completedStat');
        const bossHp = document.getElementById('bossHp');
        const rating = document.getElementById('rating');
        const notification = document.getElementById('notification');

        // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ====================
        function updateUI() {
            // Характеристики
            hpBar.style.width = (character.hp / character.maxHp * 100) + '%';
            hpText.innerText = `${character.hp}/${character.maxHp}`;
            expBar.style.width = (character.exp / character.expToNext * 100) + '%';
            expText.innerText = `${character.exp}/${character.expToNext}`;
            levelDisplay.innerText = `Ур. ${character.level}`;
            goldAmount.innerText = character.gold;
            shopGold.innerText = character.gold;

            // Статистика
            streakStat.innerText = streak;
            completedStat.innerText = completedTasksCount;
            bossHp.innerText = Math.floor(Math.random() * 30 + 60) + '%'; // просто для красоты
            rating.innerText = character.level * 50 + streak * 10;

            // Инвентарь
            renderInventory();
            // Задачи
            renderTasks();
        }

        // ==================== ЗАДАЧИ ====================
        function renderTasks() {
            taskListEl.innerHTML = '';
            tasks.forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = `task-item task-${task.type} ${task.completed ? 'completed' : ''}`;
                taskDiv.dataset.id = task.id;

                const metaHtml = task.type === 'daily' ? `<span class="task-streak">🔥 ${task.streak} дней</span>` : 
                                 task.type === 'todo' ? `<span>📅 ${task.due || 'сегодня'}</span>` : 
                                 '<span>🔄 привычка</span>';

                taskDiv.innerHTML = `
                    <div class="task-check"></div>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            ${metaHtml}
                            <span>+${task.expReward} опыта</span>
                            <span>+${task.goldReward} 🪙</span>
                        </div>
                    </div>
                `;

                taskDiv.addEventListener('click', () => completeTask(task.id));
                taskListEl.appendChild(taskDiv);
            });
            document.getElementById('taskCount').innerText = tasks.filter(t => !t.completed).length;
        }

        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task || task.completed) return;

            // Отмечаем выполненной
            task.completed = true;

            // Добавляем ресурсы
            character.exp += task.expReward;
            character.gold += task.goldReward;
            completedTasksCount++;

            // Если ежедневная, увеличиваем streak
            if (task.type === 'daily') {
                task.streak = (task.streak || 0) + 1;
                streak++;
            }

            // Проверка на повышение уровня
            checkLevelUp();

            // Показываем уведомление
            showNotification(`✅ ${task.title} выполнен! +${task.expReward} опыта, +${task.goldReward} золота`);

            // Обновляем интерфейс
            updateUI();
        }

        function checkLevelUp() {
            while (character.exp >= character.expToNext) {
                character.level++;
                character.exp -= character.expToNext;
                character.expToNext = Math.floor(character.expToNext * 1.5);
                character.maxHp += 20;
                character.hp = character.maxHp; // полное исцеление
                showNotification(`✨ УРОВЕНЬ ПОВЫШЕН! Теперь ${character.level} уровень! ✨`);
            }
        }

        // ==================== ИНВЕНТАРЬ ====================
        function renderInventory() {
            inventoryContainer.innerHTML = '';
            inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                    <div class="item-count">${item.count}</div>
                `;
                // При клике используем предмет, если есть effect
                if (item.effect) {
                    div.addEventListener('click', () => useItem(item));
                }
                inventoryContainer.appendChild(div);
            });
            inventoryCount.innerText = inventory.length + '/8';
        }

        function useItem(item) {
            if (item.count <= 0) return;
            if (item.effect === 'hp') {
                character.hp = Math.min(character.hp + item.value, character.maxHp);
                showNotification(`🧪 Вы использовали ${item.name} и восстановили ${item.value} HP`);
            } else if (item.effect === 'exp') {
                character.exp += item.value;
                showNotification(`📜 Вы получили ${item.value} опыта!`);
                checkLevelUp();
            }
            item.count--;
            if (item.count === 0) {
                inventory = inventory.filter(i => i.id !== item.id);
            }
            updateUI();
        }

        // ==================== МАГАЗИН ====================
        function renderShop() {
            shopContainer.innerHTML = '';
            shop.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <div class="shop-icon">${item.icon}</div>
                    <div class="shop-info">
                        <h4>${item.name}</h4>
                        <p>${item.desc}</p>
                    </div>
                    <div class="shop-price">${item.price} 🪙</div>
                `;
                div.addEventListener('click', () => buyItem(item));
                shopContainer.appendChild(div);
            });
        }

        function buyItem(shopItem) {
            if (character.gold < shopItem.price) {
                showNotification('❌ Недостаточно золота!');
                return;
            }

            // Проверяем, есть ли уже такой предмет в инвентаре
            const existing = inventory.find(i => i.id === shopItem.id);
            if (existing) {
                existing.count++;
            } else {
                // Создаём новый предмет для инвентаря
                let newItem = {
                    id: shopItem.id,
                    name: shopItem.name,
                    icon: shopItem.icon,
                    desc: shopItem.desc,
                    count: 1
                };
                if (shopItem.id === 'potion') newItem.effect = 'hp', newItem.value = 30;
                if (shopItem.id === 'expPotion') newItem.effect = 'exp', newItem.value = 50;
                inventory.push(newItem);
            }

            character.gold -= shopItem.price;
            showNotification(`🛒 Куплено: ${shopItem.name}`);
            updateUI();
        }

        // ==================== ДОБАВЛЕНИЕ ЗАДАЧИ ====================
        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const titleInput = document.getElementById('newTaskTitle');
            const typeSelect = document.getElementById('newTaskType');
            const title = titleInput.value.trim();
            if (!title) return;

            const newTask = {
                id: Date.now(),
                title: title,
                type: typeSelect.value,
                completed: false,
                expReward: typeSelect.value === 'todo' ? 100 : 30,
                goldReward: typeSelect.value === 'todo' ? 20 : 5
            };
            if (typeSelect.value === 'daily') {
                newTask.streak = 0;
            }
            tasks.push(newTask);
            titleInput.value = '';
            updateUI();
            showNotification('➕ Новый квест добавлен!');
        });

        // ==================== УВЕДОМЛЕНИЯ ====================
        function showNotification(message) {
            notification.innerText = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            renderShop();
            updateUI();
        }

        init();

        // Небольшая имитация урона от босса (для интереса)
        setInterval(() => {
            if (character.hp > 10) {
                character.hp = Math.max(1, character.hp - Math.floor(Math.random() * 5));
                updateUI();
                if (character.hp < 30) showNotification('⚠️ Здоровье низкое! Используй зелья.');
            }
        }, 15000);
    </script>
</body>
</html>
