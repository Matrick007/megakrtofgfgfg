<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub · зеркальный оранжевый</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f9f6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .mirror-container {
            max-width: 1600px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 40px 70px -15px rgba(255, 120, 0, 0.25),
                        0 0 0 1px rgba(255, 140, 0, 0.15),
                        inset 0 2px 3px rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 950px;
            position: relative;
        }

        .mirror-container::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: radial-gradient(circle at 30% 40%, rgba(255, 140, 0, 0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 140, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 18px;
            color: #2a1e0f;
            position: relative;
            z-index: 5;
            box-shadow: 0 4px 20px rgba(255, 120, 0, 0.1);
        }

        .header-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #ffa44b, #ff8100);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 14px #ffb05c80, 0 0 0 3px white, 0 0 0 5px #ffc10730;
            cursor: pointer;
            transition: 0.2s;
        }

        .header-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px #ff9f4b;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #2f2b24;
        }

        .header-info p {
            font-size: 15px;
            color: #b75f00;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: #ffe6d0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #b75300;
            cursor: pointer;
            transition: 0.2s;
        }

        .badge:hover {
            background: #ffd4b0;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #ff8a3c;
            font-size: 26px;
        }

        .header-actions span {
            cursor: pointer;
            transition: 0.2s;
            text-shadow: 0 2px 5px #ffb668;
        }

        .header-actions span:hover {
            transform: translateY(-3px);
            color: #ff6a00;
        }

        .hub-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 4;
            background: #fffcf7;
        }

        .community-sidebar {
            width: 340px;
            background: #ffffff;
            border-right: 1px solid #ffdec2;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 6px 0 25px -12px #ffb56b;
        }

        .sidebar-header {
            padding: 26px 20px 16px;
            font-weight: 700;
            font-size: 18px;
            color: #c45d00;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #ffffff, #fff5e8);
        }

        .add-community-btn {
            background: #ffefe0;
            border: 2px solid #ffb471;
            color: #d96600;
            font-size: 28px;
            width: 46px;
            height: 46px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 8px #ffbb77;
            font-weight: 400;
        }

        .add-community-btn:hover {
            background: #ffb471;
            color: white;
            border-color: #ff8400;
            transform: scale(1.02);
        }

        .community-list {
            flex: 1;
            padding: 10px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .community-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 28px;
            background: #ffffff;
            transition: all 0.15s;
            cursor: pointer;
            color: #3b301f;
            border: 2px solid transparent;
            box-shadow: 0 2px 6px #ffc293;
            width: 100%;
            text-align: left;
        }

        .community-item.active {
            border-color: #ff9900;
            background: #fff2e4;
            box-shadow: 0 8px 18px #ffba6c;
        }

        .community-item:hover {
            background: #ffefe1;
            border-color: #ffb155;
        }

        .community-emoji {
            width: 56px;
            height: 56px;
            background: #ffd8b8;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #9c5400;
        }

        .community-info {
            flex: 1;
        }

        .community-name {
            font-weight: 700;
            font-size: 18px;
            color: #371f00;
        }

        .community-meta {
            font-size: 14px;
            color: #c16300;
            margin-top: 4px;
        }

        .community-hub {
            flex: 1;
            background: #fffcf7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .hub-header {
            padding: 24px 32px 10px;
            border-bottom: 1px solid #ffcfaa;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(4px);
        }

        .hub-title {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hub-title h1 {
            font-size: 34px;
            font-weight: 700;
            color: #2b1d0c;
            letter-spacing: -1px;
            text-shadow: 0 2px 5px #ffd9b3;
        }

        .hub-tag {
            background: #ff881f;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: inset 0 -2px 0 #b25400;
        }

        .hub-nav {
            display: flex;
            gap: 40px;
            margin-top: 24px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .nav-tab {
            background: transparent;
            border: none;
            color: #b75f00;
            font-size: 18px;
            font-weight: 600;
            padding: 8px 2px 14px;
            border-bottom: 4px solid transparent;
            cursor: pointer;
            transition: 0.1s;
            opacity: 0.7;
            white-space: nowrap;
        }

        .nav-tab.active-tab {
            color: #d96500;
            border-bottom-color: #ff9f40;
            opacity: 1;
            text-shadow: 0 1px 4px #ffc107;
        }

        .hub-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            background: #fffcf7;
        }

        .feed-item, .media-item, .discussion-item, .event-card, .poll-card, .podcast-card, .achievement-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #ffc799;
            box-shadow: 0 20px 35px -15px #ffad60, 0 5px 0 0 #ffe1c6 inset, 0 -3px 0 0 #fff3e9 inset;
            transition: 0.15s;
        }

        .item-author {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 15px;
        }

        .author-avatar {
            width: 52px;
            height: 52px;
            background: #ffc896;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #944f00;
            font-size: 24px;
            box-shadow: 0 6px 0 #ff8c40;
        }

        .author-name {
            font-weight: 700;
            color: #4b3000;
            font-size: 18px;
        }

        .timestamp {
            font-size: 14px;
            color: #d17d2a;
            margin-left: auto;
            background: #fff0dd;
            padding: 5px 14px;
            border-radius: 40px;
        }

        .post-text {
            color: #2f2a20;
            line-height: 1.5;
            margin: 14px 0 16px;
            font-size: 16px;
        }

        .reaction-bar {
            display: flex;
            gap: 25px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .reaction-btn {
            background: #fff5eb;
            border: 2px solid #ffc186;
            color: #a65400;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 40px;
            transition: 0.1s;
            box-shadow: 0 3px 0 #ff9f4b;
        }

        .reaction-btn:hover {
            background: #ffb471;
            border-color: #ff8400;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c45d00;
        }

        .media-grid, .events-grid, .polls-grid, .podcasts-grid, .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .media-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px;
            border: 2px solid #ffcd9c;
            box-shadow: 0 12px 18px -10px #ffad60;
            cursor: pointer;
            transition: 0.1s;
        }

        .media-card:hover {
            transform: scale(1.02);
            border-color: #ff9900;
        }

        .media-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            background: #ffdbbd;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 12px;
        }

        .progress-bar {
            background: #ffdbbd;
            height: 10px;
            border-radius: 20px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: #ff8c40;
            width: 60%;
            height: 100%;
            border-radius: 20px;
        }

        .stats-mini {
            display: flex;
            gap: 20px;
            color: #b75f00;
            font-weight: 600;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .feature-tag {
            background: #ffe1c6;
            color: #b75f00;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .feature-tag:hover {
            background: #ffd0a5;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,245,235,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 60px;
            width: 460px;
            padding: 40px;
            border: 3px solid #ffa54b;
            box-shadow: 0 40px 60px #ffb76b;
        }

        .modal-content h3 {
            color: #b75300;
            font-size: 32px;
            margin-bottom: 24px;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #ffc896;
            font-size: 18px;
            margin-bottom: 30px;
            background: #fffcf0;
            outline: none;
        }

        .modal-content textarea {
            border-radius: 30px;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-btn {
            background: #ffdbbd;
            border: none;
            padding: 16px 32px;
            border-radius: 40px;
            font-weight: 700;
            color: #b75f00;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-btn.primary {
            background: #ff8c40;
            color: white;
            box-shadow: 0 6px 0 #b75300;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .modal-btn.primary:hover {
            box-shadow: 0 8px 0 #b75300;
        }

        .modal-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b75300;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ff8c40;
            color: white;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px #ff8f4f;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .poll-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background: #fff5eb;
            border-radius: 50px;
            cursor: pointer;
        }

        .poll-option:hover {
            background: #ffe3cd;
        }

        .vote-count {
            margin-left: auto;
            color: #b75f00;
            font-size: 14px;
        }

        .shop-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            background: #fff5eb;
            border-radius: 30px;
            margin: 10px 0;
        }

        .shop-item button {
            margin-left: auto;
        }

        .weather-widget {
            background: linear-gradient(135deg, #ffb155, #ff8c40);
            color: white;
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 20px;
        }

        button:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #c45d00; 
        }
    </style>
</head>
<body>
    <div class="mirror-container">
        <div class="header">
            <div class="header-avatar" onclick="showToast('👤 Профиль Анны')">АН</div>
            <div class="header-info">
                <h2>Анна Николаева <span style="font-size:14px; color:#ff8c40; cursor:pointer;" onclick="showToast('✨ Премиум статус')">⭐ VIP</span></h2>
                <p>
                    <span class="badge" onclick="showNotifications()">🔔 48 уведомлений</span>
                    <span class="badge" onclick="showToast('🧡 Ваши сообщества')">🧡 12 сообществ</span>
                    <span class="badge" onclick="showToast('🏆 Достижения')">🏆 15 ачивок</span>
                </p>
            </div>
            <div class="header-actions">
                <span onclick="showToast('🔔 Уведомления')">🔔</span>
                <span onclick="openMessenger()">💬</span>
                <span onclick="showToast('⚡ Быстрые настройки')">⚡</span>
                <span onclick="showToast('🌙 Ночной режим')">🌙</span>
            </div>
        </div>

        <div class="hub-layout">
            <div class="community-sidebar">
                <div class="sidebar-header">
                    🧡 МОИ СООБЩЕСТВА · 8
                    <button class="add-community-btn" onclick="openModal('community')" title="Создать сообщество">+</button>
                </div>
                <div class="community-list" id="communityList"></div>
                <div style="padding: 10px 20px 20px;">
                    <div class="feature-tag" onclick="showToast('🔍 Расширенный поиск')" style="display:flex; align-items:center; gap:10px;">
                        🔍 поиск по сообществам
                        <span style="margin-left:auto;">✨ 50+</span>
                    </div>
                    <div class="feature-tag" onclick="showToast('📊 Статистика активности')" style="margin-top:10px;">
                        📊 статистика · онлайн 128
                    </div>
                </div>
            </div>

            <div class="community-hub">
                <div class="hub-header">
                    <div class="hub-title">
                        <h1 id="currentCommunityName">🍞 Хлебопеки</h1>
                        <span class="hub-tag" id="currentCommunityType">food · 2.3k</span>
                        <span class="hub-tag" style="background:#ffb155;" onclick="showToast('⭐ Избранное сообщество')">⭐ в избранном</span>
                    </div>
                    <div class="hub-nav" id="tabNav">
                        <button class="nav-tab active-tab" data-tab="feed">📰 Лента</button>
                        <button class="nav-tab" data-tab="media">🎬 Медиатека</button>
                        <button class="nav-tab" data-tab="discussions">💬 Обсуждения</button>
                        <button class="nav-tab" data-tab="events">📅 События</button>
                        <button class="nav-tab" data-tab="polls">📊 Опросы</button>
                        <button class="nav-tab" data-tab="podcasts">🎙 Подкасты</button>
                        <button class="nav-tab" data-tab="shop">🛍 Магазин</button>
                        <button class="nav-tab" data-tab="achievements">🏆 Достижения</button>
                    </div>
                </div>
                <div class="hub-content" id="hubContent"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        (function() {
            let communities = [
                { id: 'c1', name: '🍞 Хлебопеки', type: 'food', members: 2341,
                  feed: Array(8).fill().map((_,i) => ({ id: `f1_${i}`, author: ['Елена','Дмитрий','София','Артем','Настя'][i%5], avatar: '🍞', time: `${i+1} ч назад`, text: `Секреты идеальной чиабатты 🥖 рецепт №${i+1}`, likes: 12+i, comments: 3+i, shares: 2 })),
                  media: Array(15).fill().map((_,i) => ({ type: i%3===0?'video':'photo', caption: `Выпечка ${i+1}`, url: '#', likes: 20+i })),
                  discussions: Array(8).fill().map((_,i) => ({ id: i, title: `Температура воды ${i+1}`, replies: 10+i, last: 'Анна', views: 100+i })),
                  events: Array(4).fill().map((_,i) => ({ title: `Мастер-класс ${i+1}`, date: '12 мая', members: 15+i, going: 10 })),
                  polls: Array(3).fill().map((_,i) => ({ id: i, question: `Лучшая мука? (опрос ${i+1})`, options: ['Пшеничная','Ржаная','Цельнозерновая'], votes: [40,30,20] })),
                  podcasts: Array(5).fill().map((_,i) => ({ name: `Хлебный подкаст #${i+1}`, duration: '35 мин', episodes: 10 })),
                  shop: [{ name: '🍞 Хлебопечка', price: 12990, inStock: 5 }, { name: '📖 Книга рецептов', price: 890, inStock: 12 }],
                  achievements: [{ name: 'Мастер выпечки', points: 500, unlocked: true }, { name: 'Коллекционер рецептов', points: 300, unlocked: false }]
                },
                { id: 'c2', name: '🚀 Киберпанк', type: 'tech', members: 1567,
                  feed: Array(8).fill().map((_,i) => ({ id: `f2_${i}`, author: ['Ник','Вика','Рэй','Джек','Лена'][i%5], avatar: '🚀', time: `${i+2} ч назад`, text: `Нейроинтерфейс девайс ${i+1}`, likes: 25+i, comments: 7, shares: 3 })),
                  media: Array(15).fill().map((_,i) => ({ type: i%2===0?'art':'photo', caption: `Cyber ${i+1}` })),
                  discussions: Array(8).fill().map((_,i) => ({ title: `Футуризм ${i+1}`, replies: 18, last: 'Зевс', views: 200 })),
                  events: Array(3).fill().map((_,i) => ({ title: `Кибер-ивент ${i+1}`, date: '18 мая', members: 45 })),
                  polls: Array(3).fill().map((_,i) => ({ id: i, question: `Лучший киберпанк-фильм? (${i+1})`, options: ['Бегущий по лезвию','Матрица','Призрак в доспехах'], votes: [89,120,45] })),
                  podcasts: Array(4).fill().map((_,i) => ({ name: `CyberWave ${i+1}`, duration: '62 мин' })),
                  shop: [{ name: '💿 Неоновые очки', price: 3490, inStock: 8 }, { name: '⚡ Светящийся кабель', price: 790, inStock: 20 }],
                  achievements: [{ name: 'Кибер-пионер', points: 400, unlocked: true }]
                },
                { id: 'c3', name: '🎸 Инди-музыка', type: 'music', members: 3456,
                  feed: Array(8).fill().map((_,i) => ({ id: `f3_${i}`, author: ['Соня','Рома','Катя','Илья'][i%4], avatar: '🎸', time: `${i} д назад`, text: `Новый альбом инди-фолк ${i}`, likes: 33+i, comments: 5, shares: 1 })),
                  media: Array(15).fill().map((_,i) => ({ type: i%3===2?'video':'cover', caption: `band ${i}` })),
                  discussions: Array(8).fill().map((_,i) => ({ title: `Гитары Fender ${i}`, replies: 12, last: 'Mike' })),
                  events: Array(4).fill().map((_,i) => ({ title: `Концерт в клубе ${i}`, date: '3 июня', members: 78 })),
                  polls: Array(3).fill().map((_,i) => ({ id: i, question: `Лучший инди-трек 2025? (опрос ${i+1})`, options: ['Инди-рок','Фолк','Электроника'], votes: [120,80,60] })),
                  podcasts: Array(5).fill().map((_,i) => ({ name: `Инди-дайджест #${i+1}`, duration: '48 мин' })),
                  shop: [{ name: '🎸 Медиаторы (набор)', price: 390, inStock: 50 }],
                  achievements: [{ name: 'Меломан', points: 600, unlocked: true }]
                }
            ];

            communities.push({ id: 'c4', name: '🧘 Йога & чай', type: 'wellness', members: 892,

                    content = `

                        <input type="text" id="productNameInput" placeholder="название" value="">
                        <input type="number" id="productPriceInput" placeholder="цена" value="">
                        <input type="number" id="productStockInput" placeholder="количество" value="1">

            window.openModal = openModal;
            window.closeModal = () => modalOverlay.style.display = 'none';

            window.createCommunity = function() {
                const name = document.getElementById('communityNameInput')?.value.trim();
                const type = document.getElementById('communityTypeSelect')?.value;
                const desc = document.getElementById('communityDescInput')?.value.trim();
                if (!name) { alert('введите название'); return; }
                const newId = 'c' + Date.now();
                communities.push({ 
                    id: newId, 
                    name: name, 
                    type: type || 'custom', 
                    members: 1,
                    desc: desc,
                    feed: [],
                                        media: [], 
                    discussions: [], 
                    events: [], 
                    polls: [], 
                    podcasts: [], 
                    shop: [],
                    achievements: []
                });
                renderCommunityList();
                currentCommunityId = newId;
                renderCommunityList();
                setActiveTab('feed');
                showToast(`✅ Сообщество "${name}" создано!`);
                closeModal();
            };

            window.createPost = function() {
                const text = document.getElementById('postTextInput')?.value.trim();
                const media = document.getElementById('postMediaInput')?.value.trim();
                if (!text) { showToast('✏️ Напишите текст поста'); return; }
                
                const community = getCurrentCommunity();
                const newPost = {
                    id: `post_${Date.now()}`,
                    author: 'Анна',
                    avatar: community.name.split(' ')[0],
                    time: 'только что',
                    text: text,
                    media: media || null,
                    likes: 0,
                    comments: 0,
                    shares: 0
                };
                
                if (!community.feed) community.feed = [];
                community.feed.unshift(newPost);
                renderHubContent();
                showToast('📰 Пост опубликован!');
                closeModal();
            };

            window.createPoll = function() {
                const question = document.getElementById('pollQuestionInput')?.value.trim();
                const opt1 = document.getElementById('pollOption1')?.value.trim();
                const opt2 = document.getElementById('pollOption2')?.value.trim();
                const opt3 = document.getElementById('pollOption3')?.value.trim();
                
                if (!question || !opt1 || !opt2) { 
                    showToast('❓ Заполните вопрос и минимум 2 варианта'); 
                    return; 
                }
                
                const options = [opt1, opt2];
                if (opt3) options.push(opt3);
                
                const community = getCurrentCommunity();
                const newPoll = {
                    id: Date.now(),
                    question: question,
                    options: options,
                    votes: options.map(() => 0),
                    totalVotes: 0
                };
                
                if (!community.polls) community.polls = [];
                community.polls.push(newPoll);
                renderHubContent();
                showToast('📊 Опрос создан! Голосуйте!');
                closeModal();
            };

            window.createEvent = function() {
                const name = document.getElementById('eventNameInput')?.value.trim();
                const date = document.getElementById('eventDateInput')?.value;
                const place = document.getElementById('eventPlaceInput')?.value.trim();
                
                if (!name || !date) { 
                    showToast('📅 Укажите название и дату'); 
                    return; 
                }
                
                const community = getCurrentCommunity();
                const newEvent = {
                    title: name,
                    date: new Date(date).toLocaleDateString('ru-RU'),
                    place: place || 'Online',
                    members: 0,
                    going: 0
                };
                
                if (!community.events) community.events = [];
                community.events.push(newEvent);
                renderHubContent();
                showToast('✅ Событие добавлено в календарь');
                closeModal();
            };

            window.createProduct = function() {
                const name = document.getElementById('productNameInput')?.value.trim();
                const price = parseInt(document.getElementById('productPriceInput')?.value);
                const stock = parseInt(document.getElementById('productStockInput')?.value);
                
                if (!name || !price) { 
                    showToast('💰 Заполните название и цену'); 
                    return; 
                }
                
                const community = getCurrentCommunity();
                if (!community.shop) community.shop = [];
                community.shop.push({
                    name: name,
                    price: price,
                    inStock: stock || 1
                });
                
                renderHubContent();
                showToast('🛍 Товар добавлен в магазин');
                closeModal();
            };

            window.vote = function(pollId, optionIndex) {
                const community = getCurrentCommunity();
                const poll = community.polls?.find(p => p.id === pollId);
                if (poll) {
                    if (!poll.votes) poll.votes = new Array(poll.options.length).fill(0);
                    poll.votes[optionIndex] = (poll.votes[optionIndex] || 0) + 1;
                    poll.totalVotes = (poll.totalVotes || 0) + 1;
                    renderHubContent();
                    showToast('🗳 Голос учтён!');
                }
            };

            window.buyProduct = function(productIndex) {
                const community = getCurrentCommunity();
                const product = community.shop?.[productIndex];
                if (product && product.inStock > 0) {
                    product.inStock--;
                    userPoints -= Math.floor(product.price / 100);
                    if (userPoints < 0) userPoints = 0;
                    showToast(`✅ Куплено: ${product.name}`);
                    renderHubContent();
                } else {
                    showToast('❌ Товара нет в наличии');
                }
            };

            window.joinEvent = function(eventIndex) {
                const community = getCurrentCommunity();
                const event = community.events?.[eventIndex];
                if (event) {
                    event.going = (event.going || 0) + 1;
                    showToast(`✅ Вы идёте на: ${event.title}`);
                    renderHubContent();
                }
            };

            window.likePost = function(postId) {
                const community = getCurrentCommunity();
                const post = community.feed?.find(p => p.id === postId);
                if (post) {
                    post.likes = (post.likes || 0) + 1;
                    renderHubContent();
                    showToast('❤️ Лайк поставлен!');
                }
            };

            window.sharePost = function(postId) {
                showToast('↗️ Пост опубликован в вашей ленте');
            };

            window.followCommunity = function() {
                showToast('✅ Вы подписались на обновления');
            };

            window.showNotifications = function() {
                showToast(`🔔 У вас ${notifications} новых уведомлений`);
            };

            window.openMessenger = function() {
                showToast('💬 Чат с друзьями (online: 24)');
            };

            window.claimAchievement = function(achName) {
                userPoints += 100;
                showToast(`🏆 Достижение "${achName}" получено! +100 очков`);
            };

            function setActiveTab(tabId) {
                navTabs.forEach(tab => {
                    if (tab.dataset.tab === tabId) tab.classList.add('active-tab');
                    else tab.classList.remove('active-tab');
                });
                currentTab = tabId;
                renderHubContent();
            }

            function renderHubContent() {
                const community = getCurrentCommunity();
                if (!community) return;
                
                currentCommunityNameSpan.textContent = community.name;
                currentCommunityTypeSpan.textContent = `${community.type} · ${community.members} участников`;

                let html = '';
                
                if (currentTab === 'feed') {
                    html = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">';

                                    <button class="reaction-btn" onclick="likePost('${item.id}')">❤️ ${item.likes || 0}</button>

                                    <button class="reaction-btn" onclick="sharePost('${item.id}')">↗️ ${item.shares || 0}</button>

                        html += `<div class="media-card" onclick="showToast('▶️ Воспроизведение: ${m.caption}')">

                    discussions.forEach((d, i) => {

                    html += '<button class="reaction-btn" onclick="openModal(\'event\')"><span>+</span> Создать событие</button>';

                    events.forEach((e, i) => {
                        html += `<div class="feed-item" style="padding:18px;">

                                <span>📆 ${e.date}</span>
                                <span>📍 ${e.place || 'Online'}</span>

                    html += '<button class="reaction-btn" onclick="openModal(\'poll\')"><span>+</span> Создать опрос</button>';
                    html += '</div>';

                    polls.forEach(p => {
                        const totalVotes = p.votes?.reduce((a,b) => a + b, 0) || 0;

                            <div style="font-size:20px; font-weight:600; margin-bottom:15px;">📊 ${p.question}</div>`;
                        
                        p.options.forEach((opt, idx) => {
                            const votes = p.votes?.[idx] || 0;
                            const percent = totalVotes ? Math.round((votes / totalVotes) * 100) : 0;

                            </div>
                        </div>`;
                    });

            function renderCommunityList() {
                let html = '';
                communities.forEach(c => {
                    html += `<button class="community-item ${c.id === currentCommunityId ? 'active' : ''}" data-community-id="${c.id}">
                        <span class="community-emoji">${c.name.split(' ')[0]}</span>
                        <div class="community-info">
                            <div class="community-name">${c.name}</div>
                            <div class="community-meta">👥 ${c.members} · 📰 ${c.feed?.length || 0} постов</div>
                        </div>
                        ${c.id === currentCommunityId ? '<span style="color:#ff8c40;">⭐</span>' : ''}
                    </button>`;
                });
                communityListEl.innerHTML = html;
                
                document.querySelectorAll('.community-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentCommunityId = btn.dataset.communityId;
                        renderCommunityList();
                        setActiveTab(currentTab);
                        showToast(`🍊 Переключено на ${btn.querySelector('.community-name')?.textContent}`);
                    });
                });
            }

            navTabs.forEach(tab => {
                tab.addEventListener('click', () => setActiveTab(tab.dataset.tab));
            });

            modalOverlay.addEventListener('click', e => {
                if (e.target === modalOverlay) closeModal();
            });

            renderCommunityList();
            setActiveTab('feed');

            window.nativeAlert = window.alert;
            window.alert = (msg) => showToast(msg);
        })();
    </script>
</body>
</html>
