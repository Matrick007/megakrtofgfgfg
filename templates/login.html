<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Quick</title>
    <script src="{{ url_for('static', filename='notification.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B0A0A;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный градиентный фон (зеркальный к регистрации) */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 30%, #FF6B2B 0%, transparent 30%),
                        radial-gradient(circle at 20% 70%, #FF4500 0%, transparent 35%),
                        radial-gradient(circle at 60% 20%, #FF8C42 0%, transparent 40%),
                        linear-gradient(225deg, #0B0A0A 0%, #1A1512 100%);
            filter: blur(80px);
            opacity: 0.5;
            animation: gradientMove 15s ease infinite reverse;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.2) rotate(-5deg); opacity: 0.7; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
        }

        /* Частицы */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 70% 40%, rgba(255, 107, 43, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 30% 60%, rgba(255, 69, 0, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 15% 25%, rgba(255, 140, 66, 0.15) 1px, transparent 1px);
            background-size: 100px 100px;
            animation: particlesMove 40s linear infinite reverse;
            pointer-events: none;
        }

        @keyframes particlesMove {
            0% { background-position: 0 0; }
            100% { background-position: -100px 100px; }
        }

        /* Главный контейнер */
        .auth-wrapper {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 66, 0.15);
            border-radius: 60px;
            box-shadow: 0 50px 100px -30px rgba(255, 69, 0, 0.3),
                        0 0 0 1px rgba(255, 140, 66, 0.1) inset;
            overflow: hidden;
            animation: panelAppear 1s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        @keyframes panelAppear {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 750px;
        }

        /* Левая сторона - форма (зеркально регистрации) */
        .form-side {
            background: rgba(10, 8, 7, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .form-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 140, 66, 0.05), transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-header {
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .form-header h2 {
            font-size: 42px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .form-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .form-header p a {
            color: #FF8C42;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .form-header p a:hover {
            border-bottom-color: #FF8C42;
        }

        /* Сообщение об ошибке */
        .error-message {
            background: rgba(255, 69, 0, 0.1);
            border: 1px solid rgba(255, 69, 0, 0.3);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 30px;
            color: #FF8C42;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-message svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 140, 66, 0.2);
            border-radius: 30px;
            font-size: 16px;
            color: #FFFFFF;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #FF8C42;
            background: rgba(255, 140, 66, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 140, 66, 0.15);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            color: #FF8C42;
            opacity: 0.8;
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #FF8C42;
        }

        /* Кнопка */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #FF8C42, #FF4500);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 20px 30px -10px rgba(255, 69, 0, 0.4);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 40px -10px #FF4500;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        /* Дополнительные ссылки */
        .extra-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            z-index: 2;
            position: relative;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #FF8C42;
            cursor: pointer;
        }

        .forgot-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            border-bottom: 1px solid transparent;
        }

        .forgot-link:hover {
            color: #FF8C42;
            border-bottom-color: #FF8C42;
        }

        /* Правая сторона - креативная (зеркально регистрации) */
        .creative-side {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: linear-gradient(225deg, rgba(255, 107, 43, 0.1), rgba(255, 69, 0, 0.05));
            overflow: hidden;
        }

        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .float-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(145deg, #FF6B2B, #FF4500);
            filter: blur(60px);
            opacity: 0.3;
            animation: float 8s infinite alternate;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation-duration: 10s;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -50px;
            background: linear-gradient(145deg, #FF8C42, #FF6B2B);
            animation-duration: 12s;
            animation-delay: -3s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, -40px) scale(1.2); }
        }

        .creative-content {
            position: relative;
            z-index: 2;
            max-width: 450px;
            text-align: right;
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 140, 66, 0.15);
            border: 1px solid rgba(255, 140, 66, 0.3);
            border-radius: 100px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .welcome-badge span {
            color: #FF8C42;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .creative-content h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #FFFFFF, #FFB58A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .creative-content p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: flex;
            gap: 30px;
            justify-content: flex-end;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #FF8C42;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Адаптивность */
        @media (max-width: 1000px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .creative-side {
                display: none;
            }
            .form-side {
                padding: 60px 40px;
            }
        }

        @media (max-width: 600px) {
            .glass-panel {
                border-radius: 30px;
            }
            .form-side {
                padding: 40px 25px;
            }
            .form-header h2 {
                font-size: 32px;
            }
            .extra-links {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }

        /* Анимация появления для полей */
        .input-group {
            animation: slideIn 0.6s ease backwards;
        }

        .input-group:nth-child(1) {
            animation-delay: 0.2s;
        }

        .input-group:nth-child(2) {
            animation-delay: 0.4s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSavedTheme();

            // Переключатель пароля
            const passwordToggle = document.querySelector('.password-toggle');
            if (passwordToggle) {
                passwordToggle.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const passwordInput = document.getElementById(targetId);
                    if (!passwordInput) return;
                    
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    
                    // Меняем иконку
                    this.innerHTML = isPassword 
                        ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                        : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
                });
            }

            // Эффект фокуса на инпутах
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.parentElement.style.transform = 'scale(1.02)';
                });
                input.addEventListener('blur', function() {
                    this.parentElement.parentElement.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="particles"></div>

    <div class="auth-wrapper">
        <div class="glass-panel">
            <div class="grid-2">
                <!-- Левая сторона с формой -->
                <div class="form-side">
                    <div class="form-header">
                        <h2>Добро пожаловать</h2>
                        <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
                    </div>

                    {% if error %}
                        <div class="error-message">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <span>{{ error }}</span>
                        </div>
                    {% endif %}

                    <form method="POST">
                        <div class="input-group">
                            <label>Имя пользователя</label>
                            <div class="input-wrapper">
                                <input type="text" name="username" placeholder="username" required>
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Пароль</label>
                            <div class="input-wrapper">
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <span class="password-toggle" data-target="password">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span>Войти</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>

                        <div class="extra-links">
                            <label class="checkbox-group">
                                <input type="checkbox" checked> Запомнить меня
                            </label>
                            <a href="/forgot-password" class="forgot-link">Забыли пароль?</a>
                        </div>
                    </form>
                </div>

                <!-- Правая креативная часть -->
                <div class="creative-side">
                    <div class="floating-elements">
                        <div class="float-circle circle-1"></div>
                        <div class="float-circle circle-2"></div>
                    </div>
                    <div class="creative-content">
                        <div class="welcome-badge">
                            <span>⚡ СНОВА С НАМИ</span>
                        </div>
                        <h1>Рады видеть<br>тебя снова</h1>
                        <p>Продолжай творить, вдохновляться и достигать новых высот вместе с нашим сообществом</p>
                        
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-number">1</div>
                                <div class="stat-label">Активный<br>пользователь</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">2</div>
                                <div class="stat-label">Проекта<br>создано</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">24/7</div>
                                <div class="stat-label">Поддержка</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
